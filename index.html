<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Family Vault</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: #141722;
            --accent: #d4af37;
            --accent-hover: #f0c950;
            --text-main: #ffffff;
            --text-muted: #8b8e98;
            --danger: #ff4a4a;
            --border: #222632;
            --success: #2ec4b6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
        .header h1 { color: var(--accent); font-size: 1.4rem; font-weight: bold; letter-spacing: 1px; }
        .user-badge { background: #1f2330; padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; border: 1px solid var(--border); color: var(--accent); }

        .card { background-color: var(--card-bg); border-radius: 16px; padding: 20px; border: 1px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        
        /* Setup Profile View */
        #profileScreen { text-align: center; padding: 40px 20px; }
        select, input[type="text"], input[type="number"], button {
            width: 100%; background: #1f2330; color: white; border: 1px solid #2d3345;
            padding: 14px; border-radius: 10px; font-size: 1rem; outline: none; margin-bottom: 15px;
        }
        button { background: var(--accent); color: black; font-weight: bold; cursor: pointer; border: none; margin-bottom: 0; }
        button:hover { background: var(--accent-hover); }

        /* Dashboard Items */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-box { text-align: center; padding: 15px; background: rgba(255,255,255,0.02); border-radius: 12px; border: 1px solid var(--border); }
        .stat-box h2 { color: var(--accent); font-size: 1.8rem; margin-top: 5px; }

        .progress-container { margin-top: 15px; background: #1f2330; border-radius: 8px; height: 10px; overflow: hidden; }
        .progress-bar { background: var(--accent); height: 100%; width: 0%; transition: width 0.4s ease; }

        .input-group { display: flex; gap: 10px; }
        .input-group input { margin-bottom: 0; }
        .input-group button { width: 60px; padding: 0; font-size: 1.2rem; }

        /* Ledger Core Lists */
        .ledger-list { max-height: 250px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .ledger-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #1a1d29; border-radius: 8px; border-left: 4px solid var(--accent); }
        .ledger-left { display: flex; flex-direction: column; gap: 4px; }
        .member-tag { font-weight: bold; font-size: 0.85rem; color: var(--accent); }
        .chat-text { font-size: 0.95rem; color: var(--text-main); }
        .cat-badge { background: #252a3a; padding: 3px 8px; border-radius: 4px; font-size: 0.75rem; color: var(--text-muted); width: max-content; }
        .amount-right { display: flex; align-items: center; gap: 12px; }
        .amount-tag { font-weight: bold; font-size: 1.1rem; color: var(--text-main); }
        .delete-btn { color: var(--danger); cursor: pointer; font-size: 1.1rem; opacity: 0.7; }

        .chart-box { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        .chart-row { display: flex; align-items: center; justify-content: space-between; font-size: 0.85rem; }
        .chart-bar-bg { flex-grow: 1; margin: 0 10px; background: #1f2330; height: 8px; border-radius: 4px; overflow: hidden; }
        .chart-bar-fill { background: var(--accent); height: 100%; width: 0%; }
        .reset-link { font-size: 0.75rem; color: #444; text-align: center; cursor: pointer; margin-top: 10px; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="profileScreen" class="card">
            <h2 style="color: var(--accent); margin-bottom: 10px;">🔒 Premium Family Vault</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 25px;">Select your identity profile to unlock the operational dashboard.</p>
            
            <select id="profileSelector">
                <option value="Papa">Papa</option>
                <option value="Mama">Mama</option>
                <option value="Brother">Brother</option>
                <option value="Sister">Sister</option>
            </select>
            <button onclick="lockAndLoginDevice()">Unlock Dashboard</button>
        </div>

        <div id="mainDashboard" style="display: none;">
            
            <div class="header">
                <h1>◆ FAMILY VAULT</h1>
                <div class="user-badge" id="activeUserDisplay">👤 Profile</div>
            </div>

            <div class="card">
                <h3 style="font-size: 0.9rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px;">📅 Monthly Limits Planner</h3>
                <div class="input-group" style="margin-bottom: 15px;">
                    <input type="number" id="monthlyBudgetInput" placeholder="Set Monthly Budget Limit (e.g. 30000)">
                    <button style="width: auto; padding: 0 15px; font-size: 0.9rem;" onclick="saveMonthlyBudget()">Set</button>
                </div>
                <div class="stats-grid">
                    <div class="stat-box">
                        <span style="font-size: 0.75rem; color: var(--text-muted);">POOL TOTAL EXPENDED</span>
                        <h2 id="globalTotalDisplay">₹0</h2>
                    </div>
                    <div class="stat-box">
                        <span style="font-size: 0.75rem; color: var(--text-muted);">BUDGET BALANCES REMAINING</span>
                        <h2 id="budgetRemainingDisplay">₹0</h2>
                    </div>
                </div>
                <div class="progress-container">
                    <div class="progress-bar" id="budgetProgressBar"></div>
                </div>
            </div>

            <div class="card">
                <h3 style="font-size: 0.9rem; margin-bottom: 10px; text-transform: uppercase; color: var(--text-muted);">💬 Express Transaction Logger</h3>
                <div class="input-group">
                    <input type="text" id="expenseInput" placeholder="Type info (e.g., 500 dinner with family)...">
                    <button onclick="handleIncomingLog()">➤</button>
                </div>
            </div>

            <div class="card">
                <h3 style="font-size: 0.9rem; text-transform: uppercase; color: var(--accent); margin-bottom: 12px;">📊 Structural Category Statistics</h3>
                <div class="chart-box" id="statsChartDistribution"></div>
            </div>

            <div class="card">
                <h3 style="font-size: 0.9rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px;">📜 Live Vault Storage Ledger</h3>
                <div class="ledger-list"
