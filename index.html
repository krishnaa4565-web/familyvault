<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Vault Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #0d0e12;
            --card-bg: #16181d;
            --text-main: #ffffff;
            --text-muted: #8b8e98;
            --gold: #d4af37;
            --gold-hover: #f0c950;
            --danger: #ff4a4a;
            --border: #2a2d35;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 20px; }
        
        .container { max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
        .header h1 { color: var(--gold); font-size: 1.4rem; font-weight: 600; }
        .user-badge { background: #23262f; padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; border: 1px solid var(--border); color: var(--gold); }

        .card { background-color: var(--card-bg); border-radius: 12px; padding: 20px; border: 1px solid var(--border); }
        
        /* Profile Selection View */
        #profileScreen { text-align: center; padding: 30px 10px; }
        select, input[type="text"], button {
            width: 100%; background: #23262f; color: white; border: 1px solid #3a3f50;
            padding: 12px; border-radius: 8px; font-size: 1rem; outline: none; margin-bottom: 15px;
        }
        button { background: var(--gold); color: black; font-weight: bold; cursor: pointer; border: none; margin-bottom: 0; }
        button:hover { background: var(--gold-hover); }

        /* Total Display Ring */
        .total-box { text-align: center; padding: 15px; }
        .total-box h2 { color: var(--gold); font-size: 2.2rem; margin-top: 5px; }

        /* Input Configuration */
        .input-group { display: flex; gap: 10px; }
        .input-group input { margin-bottom: 0; }
        .input-group button { width: 60px; padding: 0; font-size: 1.2rem; }

        /* Sync Stream Ledger */
        .ledger-list { max-height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .ledger-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #23262f; }
        .ledger-item:last-child { border-bottom: none; }
        .member-tag { font-weight: bold; font-size: 0.9rem; margin-right: 5px; color: #fff; }
        .cat-badge { background: #2a2d35; padding: 3px 8px; border-radius: 4px; font-size: 0.75rem; color: var(--text-muted); }
        .amount-tag { color: var(--gold); font-weight: bold; font-size: 1rem; }
        .delete-btn { color: var(--danger); cursor: pointer; margin-left: 15px; font-size: 1rem; padding: 0 5px; opacity: 0.7; }
        .delete-btn:hover { opacity: 1; }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="profileScreen" class="card">
            <h2 style="color: var(--gold); margin-bottom: 10px;">Family Vault Setup</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 20px;">Select your profile identity to enter the vault.</p>
            
            <select id="profileSelector">
                <option value="Papa">Papa</option>
                <option value="Mama">Mama</option>
                <option value="Brother">Brother</option>
                <option value="Sister">Sister</option>
            </select>
            <button onclick="loginProfile()">Enter Dashboard</button>
        </div>

        <div id="mainDashboard" style="display: none;">
            
            <div class="header">
                <h1>◆ Family Vault</h1>
                <div class="user-badge" id="activeUserDisplay">Profile</div>
            </div>

            <div class="card total-box">
                <span style="font-size: 0.8rem; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase;">Total Shared Family Pool</span>
                <h2 id="globalTotalDisplay">₹0</h2>
            </div>

            <div class="card">
                <h3 style="font-size: 0.9rem; margin-bottom: 10px; text-transform: uppercase; color: var(--text-muted);">Log New Entry</h3>
                <div class="input-group">
                    <input type="text" id="expenseInput" placeholder="Type sentence (e.g., 500 dinner or 200 petrol)...">
                    <button onclick="addExpenseEntry()">➤</button>
                </div>
            </div>

            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <h3 style="font-size: 0.9rem; text-transform: uppercase; color: var(--gold);">Live Family Stream</h3>
                    <span onclick="fetchDatabaseUpdates()" style="cursor: pointer; color: var(--text-muted); font-size: 0.75rem;">🔄 REFRESH</span>
                </div>
                <div class="ledger-list" id="globalLedgerList">
                    <p style="color: var(--text-muted); font-size: 0.9rem;">Connecting to family database cloud...</p>
                </div>
            </div>

        </div>
    </div>

    <script>
        // ==========================================
        // 🔑 SUPABASE CLOUD CONNECTION (CONFIGURED)
        // ==========================================
        const SUPABASE_URL = "https://ffgagiqsrpvpgeexzhnh.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_P_J4_hLf-FoBv1fDgnEtdg_eKXFChGv";
        
        // Setup secure database client connect
        const dbClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let activeUser = "";

        // Profile Sign-In Logic
        function loginProfile() {
            const chosenName = document.getElementById('profileSelector').value;
            activeUser = chosenName;
            
            document.getElementById('activeUserDisplay').innerText = "👤 " + activeUser;
            document.getElementById('profileScreen').style.display = "none";
            document.getElementById('mainDashboard').style.display = "block";
            
            fetchDatabaseUpdates();
        }

        // Sentence Processing Engine
        function analyzeSentence(sentenceText) {
            const cleanText = sentenceText.toLowerCase();
            const numericalMatch = cleanText.match(/\d+/);
            const finalAmount = numericalMatch ? parseFloat(numericalMatch[0]) : 0;

            let finalCategory = "Other / Miscellaneous";
            
            if (cleanText.includes("petrol") || cleanText.includes("fuel") || cleanText.includes("bike") || cleanText.includes("car") || cleanText.includes("auto")) {
                finalCategory = "Transport & Fuel";
            } else if (cleanText.includes("food") || cleanText.includes("dinner") || cleanText.includes("grocery") || cleanText.includes("restaurant") || cleanText.includes("swiggy") || cleanText.includes("zomato")) {
                finalCategory = "Food & Dining";
            } else if (cleanText.includes("nail") || cleanText.includes("makeup") || cleanText.includes("salon") || cleanText.includes("clothes") || cleanText.includes("shopping")) {
                finalCategory = "Personal Grooming";
            } else if (cleanText.includes("bill") || cleanText.includes("rent") || cleanText.includes("electricity") || cleanText.includes("wifi") || cleanText.includes("recharge")) {
                finalCategory = "Bills & Utilities";
            }

            return { amount: finalAmount, category: finalCategory };
        }

        // Insert Entry to Cloud Database
        async function addExpenseEntry() {
            const inputField = document.getElementById('expenseInput');
            const statement = inputField.value.trim();
            if (!statement) return;

            const { amount, category } = analyzeSentence(statement);

            if (amount <= 0) {
                alert("Please input a valid number inside your sentence (e.g., 500 dinner).");
                return;
            }

            const { error } = await dbClient
                .from('family_expenses')
                .insert([{ user_name: activeUser, category: category, amount: amount }]);

            if (error) {
                alert("Database Error: " + error.message);
            } else {
                inputField.value = "";
                fetchDatabaseUpdates(); 
            }
        }

        // Delete Entry from Cloud Database
        async function removeExpenseEntry(idValue) {
            if (!confirm("Are you sure you want to permanently delete this expense?")) return;

            const { error } = await dbClient
                .from('family_expenses')
                .delete()
                .eq('id', idValue);

            if (error) {
                alert("Failed to delete entry: " + error.message);
            } else {
                fetchDatabaseUpdates();
            }
        }

        // Pull Sync Updates from Cloud
        async function fetchDatabaseUpdates() {
            const { data, error } = await dbClient
                .from('family_expenses')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                document.getElementById('globalLedgerList').innerHTML = `<p style="color:red; font-size:0.85rem;">Failed to fetch database information.</p>`;
                return;
            }

            populateDashboardMetrics(data);
        }

        // Update Interface Values
        function populateDashboardMetrics(expensesList) {
            const streamContainer = document.getElementById('globalLedgerList');
            
            if (!expensesList || expensesList.length === 0) {
                streamContainer.innerHTML = `<p style="color: var(--text-muted); font-size: 0.9rem;">No expenses logged in this pool yet.</p>`;
                document.getElementById('globalTotalDisplay').innerText = "₹0";
                return;
            }

            let computedTotal = 0;
            streamContainer.innerHTML = "";

            expensesList.forEach(item => {
                computedTotal += parseFloat(item.amount);

                streamContainer.innerHTML += `
                    <div class="ledger-item">
                        <div>
                            <span class="member-tag">[${item.user_name}]</span>
                            <span class="cat-badge">${item.category}</span>
                        </div>
                        <div style="display: flex; align-items: center;">
                            <span class="amount-tag">+₹${item.amount}</span>
                            <span class="delete-btn" onclick="removeExpenseEntry(${item.id})">🗑️</span>
                        </div>
                    </div>
                `;
            });

            document.getElementById('globalTotalDisplay').innerText = "₹" + computedTotal;
        }

        // Automated refresh poll loop checking background updates every 5 seconds
        setInterval(fetchDatabaseUpdates, 5000);
    </script>
</body>
</html>
