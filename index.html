<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Connected Family Vault & Analytics Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <style>
        :root {
            --bg: #0b0c10;
            --card-bg: #141722;
            --gold: #d4af37;
            --gold-dim: rgba(212, 175, 55, 0.2);
            --text: #ffffff;
            --text-dim: #999999;
            --border: 1px solid #d4af37;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { background-color: var(--bg); color: var(--text); padding: 15px; padding-bottom: 50px; }
        
        h1, h2, h3 { color: var(--gold); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        
        .card { background-color: var(--card-bg); border: var(--border); border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        /* 1. TOP BAR */
        .top-bar { text-align: center; border-bottom: 2px solid var(--gold); padding-bottom: 20px; margin-bottom: 20px; }
        .pool-total { font-size: 2.5rem; font-weight: bold; color: var(--gold); text-shadow: 0 0 10px var(--gold-dim); }
        
        /* Forms & Inputs */
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: var(--gold); font-size: 0.9rem; }
        input, select, textarea { width: 100%; background: var(--bg); border: 1px solid var(--gold); color: var(--text); padding: 10px; border-radius: 4px; outline: none; }
        input:focus, select:focus, textarea:focus { box-shadow: 0 0 8px var(--gold-dim); }
        
        .flex-row { display: flex; gap: 10px; }
        .flex-row > * { flex: 1; }
        
        button { background: var(--gold); color: var(--bg); border: none; padding: 12px; font-size: 1rem; font-weight: bold; border-radius: 4px; cursor: pointer; text-transform: uppercase; width: 100%; transition: 0.3s; }
        button:hover { background: #f0c950; box-shadow: 0 0 15px var(--gold-dim); }

        /* Grid Layouts for Metrics */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .grid-4 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        @media (min-width: 600px) { .grid-4 { grid-template-columns: repeat(4, 1fr); } }
        
        .metric-box { background: var(--bg); border: 1px solid #444; padding: 15px; border-radius: 6px; text-align: center; }
        .metric-title { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 5px; text-transform: uppercase; }
        .metric-value { font-size: 1.2rem; font-weight: bold; color: var(--text); }
        .metric-box.gold-border { border-color: var(--gold); }
        
        /* Lists */
        .stream-item { background: var(--bg); border-left: 4px solid var(--gold); padding: 12px; margin-bottom: 10px; border-radius: 4px; }
        .stream-header { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-dim); margin-bottom: 5px; }
        .stream-body { display: flex; justify-content: space-between; align-items: center; }
        .stream-text { font-size: 1rem; }
        .stream-amount { font-size: 1.2rem; font-weight: bold; color: var(--gold); }
        .badges { display: flex; gap: 5px; margin-top: 5px; }
        .badge { background: #222; padding: 3px 8px; border-radius: 12px; font-size: 0.75rem; border: 1px solid var(--gold-dim); color: var(--gold); }
    </style>
</head>
<body>

    <div class="top-bar card">
        <h3>Family Pool Total Expended</h3>
        <div class="pool-total" id="globalTotal">₹0.00</div>
    </div>

    <div class="card">
        <h2>Log Expense</h2>
        <div class="input-group">
            <label>Express Statement Input</label>
            <input type="text" id="expressInput" placeholder="e.g., 500 rupees dinner through card" autocomplete="off">
        </div>
        <div class="flex-row">
            <div class="input-group">
                <label>Your Name</label>
                <input type="text" id="userName" placeholder="Name">
            </div>
            <div class="input-group">
                <label>Your Role</label>
                <select id="userRole">
                    <option value="Parent">Parent</option>
                    <option value="Child">Child</option>
                </select>
            </div>
        </div>
        <div class="flex-row">
            <div class="input-group">
                <label>Payment Mode</label>
                <select id="payMode">
                    <option value="CASH">CASH</option>
                    <option value="UPI">UPI</option>
                    <option value="CARD">CARD</option>
                </select>
            </div>
            <div class="input-group">
                <label>Category (Auto-detected)</label>
                <input type="text" id="category" value="General" readonly>
            </div>
        </div>
        <div class="input-group">
            <label>Date & Time</label>
            <input type="datetime-local" id="timestamp">
        </div>
        <button onclick="submitExpense()">Log Transaction</button>
    </div>

    <div class="card">
        <h2>Analytics Breakdown</h2>
        <h3 style="font-size: 0.9rem; margin-top: 10px;">By Payment Mode</h3>
        <div class="grid-3" id="modeMetrics">
            </div>
        <h3 style="font-size: 0.9rem; margin-top: 15px;">By Category</h3>
        <div class="grid-2" id="categoryMetrics">
            </div>
    </div>

    <div class="card">
        <h2>Time Filters</h2>
        <div class="input-group">
            <label>Filter Stream by Date</label>
            <input type="date" id="calendarFilter" onchange="renderUI()">
        </div>
        <div class="grid-4" style="margin-top: 15px;">
            <div class="metric-box gold-border">
                <div class="metric-title">Today</div>
                <div class="metric-value" id="spendToday">₹0</div>
            </div>
            <div class="metric-box gold-border">
                <div class="metric-title">Week</div>
                <div class="metric-value" id="spendWeek">₹0</div>
            </div>
            <div class="metric-box gold-border">
                <div class="metric-title">Month</div>
                <div class="metric-value" id="spendMonth">₹0</div>
            </div>
            <div class="metric-box gold-border">
                <div class="metric-title">Year</div>
                <div class="metric-value" id="spendYear">₹0</div>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>Who Spent What</h2>
        <div id="userTracker" class="grid-2">
            </div>
    </div>

    <div class="card">
        <h2>Live Vault Stream</h2>
        <div id="vaultStream">
            </div>
    </div>

    <div class="card">
        <h2>Family Grievance Board</h2>
        <div class="input-group flex-row">
            <input type="text" id="complaintInput" placeholder="Log a complaint / note...">
            <button style="width: auto; padding: 0 20px;" onclick="submitComplaint()">Post</button>
        </div>
        <div id="complaintStream" style="max-height: 200px; overflow-y: auto; margin-top: 10px;">
            </div>
    </div>

    <script>
        // Set Default Timestamp to Now
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('timestamp').value = now.toISOString().slice(0,16);

        // --- GUN.JS INITIALIZATION ---
        // Using a public peer for true cross-device sync. 
        const gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
        
        // Target specific unique room namespace
        const vaultRoom = gun.get('cyber-gold-family-vault-prod-v1');
        const expensesDB = vaultRoom.get('expenses');
        const complaintsDB = vaultRoom.get('complaints');

        // Local state to hold data before rendering
        let transactions = {};
        let complaints = {};

        // --- SEMANTIC PARSING ENGINE ---
        document.getElementById('expressInput').addEventListener('input', (e) => {
            const text = e.target.value.toLowerCase();
            
            // Amount Extraction (Regex)
            const amtMatch = text.match(/\b(\d+(?:\.\d+)?)\b/);
            
            // Category Detection
            let cat = 'General';
            if (/food|dining|dinner|lunch|breakfast|swiggy|zomato|grocery|restaurant|snack/.test(text)) cat = 'Food & Dining';
            else if (/petrol|fuel|transport|uber|ola|auto|bus|train|flight|cab/.test(text)) cat = 'Transport & Fuel';
            else if (/grooming|salon|hair|spa|makeup/.test(text)) cat = 'Personal Grooming';
            else if (/bill|utility|electricity|wifi|water|recharge|rent/.test(text)) cat = 'Bills & Utilities';
            document.getElementById('category').value = cat;

            // Payment Mode Detection
            if (/cash/.test(text)) document.getElementById('payMode').value = 'CASH';
            else if (/upi|gpay|paytm|phonepe|scan/.test(text)) document.getElementById('payMode').value = 'UPI';
            else if (/card|swipe|credit|debit/.test(text)) document.getElementById('payMode').value = 'CARD';
        });

        // --- SUBMIT HANDLERS ---
        function submitExpense() {
            const statement = document.getElementById('expressInput').value;
            const amtMatch = statement.match(/\b(\d+(?:\.\d+)?)\b/);
            const amount = amtMatch ? parseFloat(amtMatch[1]) : 0;
            const name = document.getElementById('userName').value.trim() || 'Anonymous';
            
            if (amount <= 0) return alert("Please include a valid amount in the statement.");

            const data = {
                statement: statement,
                amount: amount,
                name: name,
                role: document.getElementById('userRole').value,
                mode: document.getElementById('payMode').value,
                category: document.getElementById('category').value,
                timestamp: document.getElementById('timestamp').value
            };

            // Push to GunDB
            expensesDB.set(data);
            
            // Clear input
            document.getElementById('expressInput').value = '';
            document.getElementById('category').value = 'General';
        }

        function submitComplaint() {
            const txt = document.getElementById('complaintInput').value.trim();
            const name = document.getElementById('userName').value.trim() || 'Anonymous';
            if (!txt) return;
            
            complaintsDB.set({
                text: txt,
                name: name,
                timestamp: new Date().toISOString()
            });
            document.getElementById('complaintInput').value = '';
        }

        // --- SYNC LISTENERS ---
        expensesDB.map().on((data, id) => {
            if (data && data.amount !== undefined) {
                transactions[id] = data;
                renderUI();
            }
        });

        complaintsDB.map().on((data, id) => {
            if (data && data.text) {
                complaints[id] = data;
                renderComplaints();
            }
        });

        // --- RENDERING ENGINE ---
        function renderUI() {
            const filterDateStr = document.getElementById('calendarFilter').value;
            const txs = Object.values(transactions);
            
            let totalSpend = 0;
            let modeTotals = { CASH: 0, UPI: 0, CARD: 0 };
            let catTotals = { 'Food & Dining': 0, 'Transport & Fuel': 0, 'Personal Grooming': 0, 'Bills & Utilities': 0, 'General': 0 };
            let userTotals = {};
            
            let streamHTML = '';

            // Time filters
            const nowTime = new Date();
            let spendToday = 0, spendWeek = 0, spendMonth = 0, spendYear = 0;

            // Sort by descending timestamp
            txs.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

            txs.forEach(tx => {
                const amt = parseFloat(tx.amount);
                const txDate = new Date(tx.timestamp);
                
                // Globals
                totalSpend += amt;
                if(modeTotals[tx.mode] !== undefined) modeTotals[tx.mode] += amt;
                if(catTotals[tx.category] !== undefined) catTotals[tx.category] += amt;
                
                userTotals[tx.name] = (userTotals[tx.name] || 0) + amt;

                // Time Calculations
                const diffTime = Math.abs(nowTime - txDate);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
                
                if (diffDays === 1 || txDate.toDateString() === nowTime.toDateString()) spendToday += amt;
                if (diffDays <= 7) spendWeek += amt;
                if (txDate.getMonth() === nowTime.getMonth() && txDate.getFullYear() === nowTime.getFullYear()) spendMonth += amt;
                if (txDate.getFullYear() === nowTime.getFullYear()) spendYear += amt;

                // Filtering for Vault Stream
                let showInStream = true;
                if (filterDateStr) {
                    const filterDate = new Date(filterDateStr);
                    if (txDate.toDateString() !== filterDate.toDateString()) {
                        showInStream = false;
                    }
                }

                if (showInStream) {
                    streamHTML += `
                    <div class="stream-item">
                        <div class="stream-header">
                            <span><b>${tx.name}</b> (${tx.role})</span>
                            <span>${txDate.toLocaleString()}</span>
                        </div>
                        <div class="stream-body">
                            <span class="stream-text">${tx.statement}</span>
                            <span class="stream-amount">₹${amt.toFixed(2)}</span>
                        </div>
                        <div class="badges">
                            <span class="badge">${tx.category}</span>
                            <span class="badge">${tx.mode}</span>
                        </div>
                    </div>`;
                }
            });

            // Update DOM
            document.getElementById('globalTotal').innerText = `₹${totalSpend.toFixed(2)}`;
            document.getElementById('vaultStream').innerHTML = streamHTML || '<div class="stream-item">No transactions found.</div>';
            
            // Modes
            document.getElementById('modeMetrics').innerHTML = ['CASH','UPI','CARD'].map(mode => {
                const perc = totalSpend > 0 ? ((modeTotals[mode] / totalSpend) * 100).toFixed(1) : 0;
                return `
                <div class="metric-box">
                    <div class="metric-title">${mode}</div>
                    <div class="metric-value">₹${modeTotals[mode].toFixed(2)}</div>
                    <div class="metric-title" style="color:var(--gold); margin-top:5px;">${perc}%</div>
                </div>`;
            }).join('');

            // Categories
            document.getElementById('categoryMetrics').innerHTML = Object.keys(catTotals).map(cat => `
                <div class="metric-box">
                    <div class="metric-title">${cat}</div>
                    <div class="metric-value">₹${catTotals[cat].toFixed(2)}</div>
                </div>
            `).join('');

            // User Tracker
            document.getElementById('userTracker').innerHTML = Object.keys(userTotals).map(u => `
                <div class="metric-box gold-border">
                    <div class="metric-title">${u}</div>
                    <div class="metric-value">₹${userTotals[u].toFixed(2)}</div>
                </div>
            `).join('');

            // Time Dashboard
            document.getElementById('spendToday').innerText = `₹${spendToday.toFixed(2)}`;
            document.getElementById('spendWeek').innerText = `₹${spendWeek.toFixed(2)}`;
            document.getElementById('spendMonth').innerText = `₹${spendMonth.toFixed(2)}`;
            document.getElementById('spendYear').innerText = `₹${spendYear.toFixed(2)}`;
        }

        function renderComplaints() {
            const filterDateStr = document.getElementById('calendarFilter').value;
            let arr = Object.values(complaints).sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            
            if (filterDateStr) {
                const fDate = new Date(filterDateStr);
                arr = arr.filter(c => new Date(c.timestamp).toDateString() === fDate.toDateString());
            }

            document.getElementById('complaintStream').innerHTML = arr.map(c => `
                <div class="stream-item" style="border-left-color: #ff4444;">
                    <div class="stream-header">
                        <span><b>${c.name}</b></span>
                        <span>${new Date(c.timestamp).toLocaleString()}</span>
                    </div>
                    <div class="stream-text" style="color:#ddd;">${c.text}</div>
                </div>
            `).join('') || '<div style="color:var(--text-dim);font-size:0.9rem;">No complaints found.</div>';
        }
    </script>
</body>
</html>
